<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Unsupported Browser (406)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Unbounded:wght@600;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #FAF7F2;
      color: #6B6560;
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 520px;
      width: 100%;
      padding: 48px 24px;
      text-align: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 40px;
    }

    .error-code {
      font-family: 'Unbounded', sans-serif;
      font-weight: 800;
      font-size: 96px;
      color: #222222;
      line-height: 1;
      -webkit-transform: rotate(-2deg);
      transform: rotate(-2deg);
      margin-bottom: 24px;
    }

    .badge {
      display: inline-block;
      background: #D32F2F;
      color: #FFFFFF;
      font-family: 'Unbounded', sans-serif;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      padding: 6px 16px;
      border: 3px solid #222222;
      margin-bottom: 24px;
    }

    .message {
      font-size: 17px;
      line-height: 1.6;
      color: #6B6560;
      margin-bottom: 32px;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      font-family: 'Unbounded', sans-serif;
      font-weight: 600;
      font-size: 15px;
      padding: 14px 32px;
      border: 3px solid #222222;
      cursor: pointer;
      text-decoration: none;
      -webkit-transition: transform 0.2s, box-shadow 0.2s;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary {
      background: #D32F2F;
      color: #FFFFFF;
    }

    .btn-primary:hover {
      -webkit-transform: translateY(-4px);
      transform: translateY(-4px);
      box-shadow: 5px 5px 0px #222222;
    }

    .btn-secondary {
      background: #FFFFFF;
      color: #222222;
    }

    .btn-secondary:hover {
      -webkit-transform: translateY(-4px);
      transform: translateY(-4px);
      box-shadow: 5px 5px 0px #D32F2F;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="/logo/GriffithICTClubIcon.svg" alt="Griffith ICT Club">
    <div class="error-code">406</div>
    <div class="badge">UNSUPPORTED BROWSER</div>
    <p class="message">Your browser is a bit behind the times. Update to a modern browser like Chrome, Firefox, Safari, or Edge to get the full experience.</p>
    <div class="buttons">
      <a href="https://www.google.com/chrome/" class="btn btn-primary">Download Chrome</a>
      <a href="https://www.mozilla.org/firefox/" class="btn btn-secondary">Download Firefox</a>
      <a id="report" href="mailto:contact@griffithict.club" class="btn btn-secondary">Report a Bug</a>
    </div>
  </div>
  <script>
    var r = document.getElementById('report');
    var s = encodeURIComponent('Report - Unsupported Browser');
    var b = encodeURIComponent('Error Code: 406\nRoute: ' + location.href + '\nUser Agent: ' + navigator.userAgent + '\n\nDescribe the issue:\n');
    r.href = 'mailto:contact@griffithict.club?subject=' + s + '&body=' + b;
  </script>
</body>
</html>
