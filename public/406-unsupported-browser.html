<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Unsupported Browser (406)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Unbounded:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/error.css">
  <script src="/error.js" defer></script>
</head>
<body data-error-code="406" data-error-title="Unsupported Browser">
  <main>
    <img class="logo" src="/logo/GriffithICTClubIcon.svg" alt="Griffith ICT Club">
    <p class="error-code" aria-hidden="true">406</p>
    <h1 class="badge">Unsupported Browser</h1>
    <p class="message">Your browser isn't supported. Upgrade to a current browser, then try again.</p>
    <div class="buttons">
      <a href="/" class="btn btn-primary">Try Again</a>
      <a href="mailto:contact@griffithict.club" data-report-error class="btn btn-secondary">Get Help</a>
    </div>
  </main>
</body>
</html>
