<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Server Error (500)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Unbounded:wght@600;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #FAF7F2;
      color: #6B6560;
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 520px;
      width: 100%;
      padding: 48px 24px;
      text-align: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 40px;
      opacity: 0;
      transform: translateY(20px);
      animation: fade-up 0.4s cubic-bezier(0.2, 0, 0, 1) forwards;
    }

    .error-code {
      font-family: 'Unbounded', sans-serif;
      font-weight: 800;
      font-size: clamp(96px, 20vw, 144px);
      color: #222222;
      line-height: 1;
      transform: rotate(-2deg);
      margin-bottom: 24px;
      opacity: 0;
      animation: stamp 0.35s cubic-bezier(0.2, 0, 0, 1) 0.1s forwards;
    }

    .error-code span {
      display: inline-block;
      animation: shake 0.5s ease-in-out infinite;
    }

    .badge {
      display: inline-block;
      background: #D32F2F;
      color: #FFFFFF;
      font-family: 'Unbounded', sans-serif;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      padding: 6px 16px;
      border: 3px solid #222222;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(20px);
      animation: fade-up 0.4s cubic-bezier(0.2, 0, 0, 1) 0.2s forwards;
    }

    .message {
      font-size: 17px;
      line-height: 1.6;
      color: #6B6560;
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(20px);
      animation: fade-up 0.4s cubic-bezier(0.2, 0, 0, 1) 0.3s forwards;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      opacity: 0;
      transform: translateY(20px);
      animation: fade-up 0.4s cubic-bezier(0.2, 0, 0, 1) 0.4s forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: 'Unbounded', sans-serif;
      font-weight: 600;
      font-size: 15px;
      padding: 14px 32px;
      border: 3px solid #222222;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn:active { transform: translateY(0) !important; box-shadow: none !important; }

    .btn-primary {
      background: #D32F2F;
      color: #FFFFFF;
    }

    .btn-primary:hover {
      transform: translateY(-4px);
      box-shadow: 5px 5px 0px #222222;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes stamp {
      0% { opacity: 0; transform: scale(1.3) rotate(-2deg) translateY(-30px); }
      60% { opacity: 1; transform: scale(0.97) rotate(-2deg) translateY(2px); }
      100% { opacity: 1; transform: scale(1) rotate(-2deg) translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-3px); }
      75% { transform: translateX(3px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="/logo/GriffithICTClubIcon.svg" alt="Griffith ICT Club">
    <div class="error-code"><span>500</span></div>
    <div class="badge">SERVER ERROR</div>
    <p class="message">Well, that wasn't supposed to happen. Our servers tripped over something. We've been notified and are looking into it.</p>
    <div class="buttons">
      <a href="/" class="btn btn-primary">Go Home</a>
    </div>
  </div>
</body>
</html>
