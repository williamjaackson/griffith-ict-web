<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Server Error (500)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Unbounded:wght@600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/error.css">
  <script src="/error.js" defer></script>
</head>
<body data-error-code="500" data-error-title="Server Error">
  <main>
    <img class="logo" src="/logo/GriffithICTClubIcon.svg" alt="Griffith ICT Club">
    <p class="error-code" aria-hidden="true">500</p>
    <h1 class="badge">Server Error</h1>
    <p class="message">Something went wrong on our end. If this keeps happening, let us know.</p>
    <div class="buttons">
      <a href="/" class="btn btn-primary">Go Home</a>
      <a href="mailto:contact@griffithict.club" data-report-error class="btn btn-secondary">Report a Bug</a>
    </div>
  </main>
</body>
</html>
