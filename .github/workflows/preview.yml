name: Preview

on:
  pull_request:
    types: [labeled, unlabeled, closed, synchronize]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  remove-label-on-fork:
    if: >
      github.event.pull_request.head.repo.full_name != github.repository &&
      ((github.event.action == 'labeled' && github.event.label.name == 'preview') ||
       (github.event.action == 'synchronize' &&
        contains(github.event.pull_request.labels.*.name, 'preview')))
    runs-on: ubuntu-latest
    steps:
      - name: Remove preview label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'preview',
            });

  deploy-preview:
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      ((github.event.action == 'labeled' && github.event.label.name == 'preview') ||
       (github.event.action == 'synchronize' &&
        contains(github.event.pull_request.labels.*.name, 'preview')))
    runs-on: ubuntu-latest
    steps:
      - name: Check out deployment scripts
        uses: actions/checkout@v4

      - name: Validate preview port
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: .github/scripts/validate-preview-number "$PR_NUMBER"

      - name: Deploy exact preview commit
        uses: nick-fields/retry@v3
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_REPO: ${{ github.event.pull_request.head.repo.clone_url }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: .github/scripts/run-remote .github/scripts/deploy-preview "$PR_NUMBER" "$PR_SHA" "$PR_REPO"

      - name: Add preview URL to PR description
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewLine = `🚀 Preview Site: https://preview-${prNumber}.griffithict.club/`;
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const currentBody = pullRequest.body || '';

            if (!currentBody.includes(previewLine)) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                body: previewLine + '\n\n' + currentBody,
              });
            }

  teardown-preview:
    if: >
      github.event.pull_request.head.repo.full_name == github.repository &&
      ((github.event.action == 'unlabeled' && github.event.label.name == 'preview') ||
       (github.event.action == 'closed' &&
        contains(github.event.pull_request.labels.*.name, 'preview')))
    runs-on: ubuntu-latest
    steps:
      - name: Check out deployment scripts
        uses: actions/checkout@v4

      - name: Teardown preview
        uses: nick-fields/retry@v3
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 30
          command: .github/scripts/run-remote .github/scripts/teardown-preview "$PR_NUMBER"

      - name: Remove preview URL from PR description
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewLine = `🚀 Preview Site: https://preview-${prNumber}.griffithict.club/`;
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const currentBody = pullRequest.body || '';
            const cleaned = currentBody.replace(`${previewLine}\n\n`, '').replace(previewLine, '');

            if (cleaned !== currentBody) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                body: cleaned,
              });
            }
