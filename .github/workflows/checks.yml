name: Checks

on:
  pull_request:
    branches: [master]

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Sanity checks
        run: bin/rails sanity:check
